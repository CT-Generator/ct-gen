# Conspiracy Generator v2 — production stack.
# Spec: openspec/changes/v2-rebuild/specs/infrastructure/spec.md

name: cgen

services:
  caddy:
    image: caddy:2-alpine
    container_name: cgen-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks: [edge, internal]

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: cgen-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://app:${POSTGRES_APP_PASSWORD:?missing}@db:5432/cgen
      # *_FILE env vars are resolved by web/lib/env.ts at boot — see resolveFileEnvVars().
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      OPENAI_MODEL: gpt-5-mini
      OPENAI_MODEL_FALLBACK: gpt-5-mini
      OPENAI_MODERATION_MODEL: omni-moderation-latest
      SESSION_HASH_SALT_FILE: /run/secrets/session_hash_salt
      # STATS_PASSWORD is read by middleware.ts which runs in the Edge runtime
      # and can't touch the filesystem — pass it as a plain env var here.
      STATS_PASSWORD: ${STATS_PASSWORD:?missing}
      PUBLIC_BASE_URL: https://conspiracy-generator.duckdns.org
    secrets:
      - openai_api_key
      - session_hash_salt
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  db:
    image: postgres:16-alpine
    container_name: cgen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: postgres
      APP_PASSWORD_FILE: /run/secrets/postgres_app_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    secrets:
      - postgres_password
      - postgres_app_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks: [internal]

  backup:
    build:
      context: ./backup
    container_name: cgen-backup
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: postgres
      PGDATABASE: cgen
      PGPASSWORD_FILE: /run/secrets/postgres_password
      # Optional offsite copy. Leave the URL empty to skip.
      OFFSITE_RCLONE_REMOTE: ${OFFSITE_RCLONE_REMOTE:-}
      RETENTION_DAYS: "30"
    volumes:
      - ./backups:/backups
    secrets:
      - postgres_password
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

networks:
  edge:
  internal:
    # NOT marked internal:true — the web service needs outbound to api.openai.com.
    # The db container has no host port binding (production compose) so it remains
    # unreachable from outside the host even on a non-internal bridge network.

volumes:
  pgdata:

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  session_hash_salt:
    file: ./secrets/session_hash_salt.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_app_password:
    file: ./secrets/postgres_app_password.txt
